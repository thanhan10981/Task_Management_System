version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    container_name: task_management_db
    environment:
      POSTGRES_USER: ${DB_USER:-taskmgr}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-taskmgr123}
      POSTGRES_DB: ${DB_NAME:-task_management}
    ports:
      - '15432:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-taskmgr}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - task_network

networks:
  task_network:
    driver: bridge

volumes:
  postgres_data:
