<svg viewBox="0 0 280 220" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="nsg1" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#6366f1" stop-opacity="0.18"/>
      <stop offset="100%" stop-color="#06b6d4" stop-opacity="0.08"/>
    </linearGradient>
    <linearGradient id="nsg2" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#6366f1"/>
      <stop offset="100%" stop-color="#818cf8"/>
    </linearGradient>
    <linearGradient id="nsg3" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#06b6d4"/>
      <stop offset="100%" stop-color="#38bdf8"/>
    </linearGradient>
    <filter id="nsblur">
      <feGaussianBlur stdDeviation="8" result="blur"/>
      <feComposite in="SourceGraphic" in2="blur" operator="over"/>
    </filter>
    <style>
      .nosel-cursor {
        animation: nosel-click 2.5s ease-in-out infinite;
        transform-origin: 196px 73px;
      }
      @keyframes nosel-click {
        0%, 100% { transform: scale(1); opacity: 1; }
        40%       { transform: scale(0.85); opacity: 0.7; }
        60%       { transform: scale(1.1); opacity: 1; }
      }
    </style>
  </defs>

  <!-- Glow blob -->
  <ellipse cx="140" cy="110" rx="100" ry="70" fill="url(#nsg1)" filter="url(#nsblur)"/>

  <!-- Card background -->
  <rect x="30" y="20" width="220" height="180" rx="18"
        fill="#1e2235" stroke="rgba(99,102,241,0.22)" stroke-width="1"/>

  <!-- Header strip -->
  <rect x="30" y="20" width="220" height="44" rx="18" fill="rgba(99,102,241,0.07)"/>
  <rect x="30" y="45" width="220" height="19"          fill="rgba(99,102,241,0.07)"/>

  <!-- Traffic-light dots -->
  <circle cx="52" cy="42" r="5" fill="#f43f5e" opacity="0.7"/>
  <circle cx="66" cy="42" r="5" fill="#f59e0b" opacity="0.7"/>
  <circle cx="80" cy="42" r="5" fill="#22c55e" opacity="0.7"/>

  <!-- Select Project button / pill -->
  <rect x="158" y="32" width="76" height="22" rx="8" fill="url(#nsg2)" opacity="0.9"/>
  <text x="169" y="47" font-size="9" fill="white" font-family="sans-serif" font-weight="600">Select Project</text>
  <path d="M226 40l4 4 4-4" stroke="white" stroke-width="1.5"
        stroke-linecap="round" stroke-linejoin="round"/>

  <!-- Open dropdown menu -->
  <rect x="158" y="58" width="76" height="70" rx="8"
        fill="#252b42" stroke="rgba(99,102,241,0.28)" stroke-width="1"/>

  <!-- Menu item 1 — highlighted -->
  <rect x="164" y="65" width="64" height="16" rx="5" fill="rgba(99,102,241,0.22)"/>
  <circle cx="172" cy="73" r="4" fill="#6366f1"/>
  <rect x="180" y="70" width="38" height="5" rx="2.5" fill="#818cf8" opacity="0.9"/>

  <!-- Menu item 2 -->
  <circle cx="172" cy="93" r="4" fill="rgba(6,182,212,0.5)"/>
  <rect x="180" y="90" width="32" height="5" rx="2.5" fill="rgba(148,163,184,0.5)"/>

  <!-- Menu item 3 -->
  <circle cx="172" cy="113" r="4" fill="rgba(167,139,250,0.5)"/>
  <rect x="180" y="110" width="26" height="5" rx="2.5" fill="rgba(148,163,184,0.4)"/>

  <!-- Mini stat card (left) -->
  <rect x="42" y="82" width="100" height="50" rx="10"
        fill="rgba(99,102,241,0.08)" stroke="rgba(99,102,241,0.18)" stroke-width="1"/>
  <rect x="52" y="93"  width="36" height="5" rx="2"   fill="rgba(148,163,184,0.35)"/>
  <rect x="52" y="103" width="22" height="8" rx="3"   fill="url(#nsg2)" opacity="0.7"/>
  <path d="M88 118 C92 112 98 106 110 108 C116 110 120 116 130 112"
        stroke="#6366f1" stroke-width="1.5" stroke-linecap="round" fill="none" opacity="0.6"/>

  <!-- Skeleton rows -->
  <rect x="42" y="145" width="196" height="8" rx="4" fill="rgba(148,163,184,0.08)"/>
  <rect x="42" y="159" width="160" height="8" rx="4" fill="rgba(148,163,184,0.06)"/>
  <rect x="42" y="173" width="120" height="8" rx="4" fill="rgba(148,163,184,0.05)"/>

  <!-- Animated cursor / click ring -->
  <g class="nosel-cursor">
    <circle cx="196" cy="73" r="10"
            fill="rgba(99,102,241,0.18)" stroke="rgba(99,102,241,0.5)" stroke-width="1"/>
    <path d="M192 70l2 6 1.5-2 2.5 3 1-1-2.5-3 2-1z" fill="#818cf8"/>
  </g>
</svg>
